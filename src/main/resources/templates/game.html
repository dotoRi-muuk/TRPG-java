<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRPG 스킬 시뮬레이터</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 30px;
        }
        
        h1 {
            text-align: center;
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        
        .section {
            background: #f8f9fa;
            padding: 25px;
            margin-bottom: 25px;
            border-radius: 10px;
            border: 2px solid #e9ecef;
        }
        
        .section h2 {
            color: #495057;
            margin-bottom: 20px;
            font-size: 1.3em;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #495057;
            font-weight: 600;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 14px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            font-size: 1.1em;
            transition: border-color 0.3s;
            background: white;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group select {
            cursor: pointer;
        }

        .form-group select option {
            padding: 10px;
        }
        
        .btn {
            padding: 14px 30px;
            font-size: 1.1em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            width: 100%;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .result-box {
            margin-top: 20px;
            padding: 20px;
            background: white;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            display: none;
        }
        
        .result-box.show {
            display: block;
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .result-title {
            font-weight: 600;
            color: #667eea;
            font-size: 1.2em;
            margin-bottom: 10px;
        }
        
        .result-content {
            color: #495057;
            line-height: 1.8;
            white-space: pre-wrap;
            font-family: 'Consolas', 'Monaco', monospace;
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .result-summary {
            margin-top: 15px;
            padding: 15px;
            background: #e8f4fd;
            border-radius: 8px;
        }
        
        .result-summary .stat {
            display: inline-block;
            margin-right: 20px;
            margin-bottom: 5px;
        }
        
        .result-summary .stat-label {
            color: #666;
            font-size: 0.9em;
        }
        
        .result-summary .stat-value {
            font-weight: 600;
            color: #333;
            font-size: 1.1em;
        }
        
        .highlight {
            background: #fff3cd;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 600;
        }
        
        .success {
            color: #28a745;
            font-weight: 600;
        }
        
        .failure {
            color: #dc3545;
            font-weight: 600;
        }
        
        .params-section {
            display: none;
        }
        
        .params-section.show {
            display: block;
        }
        
        .param-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .param-item {
            margin-bottom: 10px;
        }

        .param-item label {
            display: block;
            margin-bottom: 5px;
            color: #495057;
            font-weight: 500;
            font-size: 0.95em;
        }

        .param-item input[type="number"],
        .param-item input[type="text"],
        .param-item select {
            width: 100%;
            padding: 10px;
            border: 2px solid #dee2e6;
            border-radius: 6px;
            font-size: 1em;
        }

        .param-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #667eea;
        }

        .step-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            background: #667eea;
            color: white;
            border-radius: 50%;
            font-weight: bold;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚔️ TRPG 스킬 시뮬레이터</h1>
        <p class="subtitle">직업군과 스킬을 선택하여 데미지를 계산하세요</p>
        
        <!-- Step 1: Primary Class Selection -->
        <div class="section">
            <h2><span class="step-number">1</span> 직업군 선택</h2>
            <div class="form-group">
                <label for="primaryClass">직업군을 선택하세요</label>
                <select id="primaryClass" onchange="loadSubclasses()">
                    <option value="">-- 직업군 선택 --</option>
                </select>
            </div>
        </div>
        
        <!-- Step 2: Subclass Selection -->
        <div class="section">
            <h2><span class="step-number">2</span> 직업 선택</h2>
            <div class="form-group">
                <label for="subclass">직업을 선택하세요</label>
                <select id="subclass" onchange="loadSkills()" disabled>
                    <option value="">-- 먼저 직업군을 선택하세요 --</option>
                </select>
            </div>
        </div>
        
        <!-- Step 3: Skill Selection -->
        <div class="section">
            <h2><span class="step-number">3</span> 스킬 선택</h2>
            <div class="form-group">
                <label for="skill">스킬을 선택하세요</label>
                <select id="skill" onchange="loadParameters()" disabled>
                    <option value="">-- 먼저 직업을 선택하세요 --</option>
                </select>
            </div>
        </div>
        
        <!-- Step 4: Parameters -->
        <div class="section params-section" id="paramsSection">
            <h2><span class="step-number">4</span> 스킬 인자 입력</h2>
            <div class="param-grid" id="paramsContainer">
                <!-- Parameters will be dynamically added here -->
            </div>
        </div>

        <!-- Step 5: External Modifiers -->
        <div class="section">
            <h2><span class="step-number">5</span> 직업 외 효과 설정</h2>
            <p style="color:#666; margin-bottom:15px; font-size:0.95em;">
                계산 공식: <strong>[(직업 데미지) × (100 + 데미지 증가값)%] × (100 + 레벨²)% × 최종 데미지 배율%</strong>
            </p>
            <div class="param-grid">
                <div class="param-item">
                    <label for="globalLevel">레벨 <small style="color:#888">(최종 데미지 (100+레벨²)% 적용, 0=미적용)</small></label>
                    <input type="number" id="globalLevel" value="0" min="0">
                </div>
                <div class="param-item">
                    <label for="globalDamageBonus">데미지 증가값 <small style="color:#888">(합연산 %, 기본 0)</small></label>
                    <input type="number" id="globalDamageBonus" value="0">
                </div>
                <div class="param-item">
                    <label for="globalFinalDamageMult">최종 데미지 배율 <small style="color:#888">(%, 100=기본, 200=2배)</small></label>
                    <input type="number" id="globalFinalDamageMult" value="100" min="1">
                </div>
            </div>
        </div>

        <!-- Execute Button -->
        <div class="section">
            <button id="executeBtn" onclick="executeSkill()" class="btn btn-primary" disabled>
                🎯 스킬 실행
            </button>
        </div>
        
        <!-- Result -->
        <div id="resultBox" class="result-box">
            <div class="result-title">📊 실행 결과</div>
            <div class="result-content" id="resultContent"></div>
            <div class="result-summary" id="resultSummary"></div>
        </div>
    </div>
    
    <script>
        // Store current skills data
        let currentSkills = [];
        let currentParameters = [];

        // Load primary classes on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadPrimaryClasses();
        });

        function loadPrimaryClasses() {
            fetch('/api/classes')
                .then(response => response.json())
                .then(classes => {
                    const select = document.getElementById('primaryClass');
                    select.innerHTML = '<option value="">-- 직업군 선택 --</option>';
                    classes.forEach(cls => {
                        const option = document.createElement('option');
                        option.value = cls;
                        option.textContent = cls;
                        select.appendChild(option);
                    });
                })
                .catch(error => {
                    console.error('Error loading classes:', error);
                    alert('직업군 데이터를 불러오는 중 오류가 발생했습니다.');
                });
        }

        function loadSubclasses() {
            const primaryClass = document.getElementById('primaryClass').value;
            const subclassSelect = document.getElementById('subclass');
            const skillSelect = document.getElementById('skill');
            const paramsSection = document.getElementById('paramsSection');
            const executeBtn = document.getElementById('executeBtn');
            
            // Reset downstream selections
            subclassSelect.innerHTML = '<option value="">-- 직업 선택 --</option>';
            skillSelect.innerHTML = '<option value="">-- 먼저 직업을 선택하세요 --</option>';
            skillSelect.disabled = true;
            paramsSection.classList.remove('show');
            executeBtn.disabled = true;
            document.getElementById('resultBox').classList.remove('show');

            if (!primaryClass) {
                subclassSelect.disabled = true;
                return;
            }

            subclassSelect.disabled = false;
            
            fetch(`/api/classes/${encodeURIComponent(primaryClass)}/subclasses`)
                .then(response => response.json())
                .then(subclasses => {
                    subclasses.forEach(sub => {
                        const option = document.createElement('option');
                        option.value = sub;
                        option.textContent = sub;
                        subclassSelect.appendChild(option);
                    });
                })
                .catch(error => {
                    console.error('Error loading subclasses:', error);
                    alert('직업 데이터를 불러오는 중 오류가 발생했습니다.');
                });
        }

        function loadSkills() {
            const subclass = document.getElementById('subclass').value;
            const skillSelect = document.getElementById('skill');
            const paramsSection = document.getElementById('paramsSection');
            const executeBtn = document.getElementById('executeBtn');
            
            // Reset downstream selections
            skillSelect.innerHTML = '<option value="">-- 스킬 선택 --</option>';
            paramsSection.classList.remove('show');
            executeBtn.disabled = true;
            document.getElementById('resultBox').classList.remove('show');

            if (!subclass) {
                skillSelect.disabled = true;
                return;
            }

            skillSelect.disabled = false;
            
            fetch(`/api/subclasses/${encodeURIComponent(subclass)}/skills`)
                .then(response => response.json())
                .then(skills => {
                    currentSkills = skills;
                    skills.forEach(skill => {
                        const option = document.createElement('option');
                        option.value = skill.methodName;
                        option.textContent = skill.displayName;
                        skillSelect.appendChild(option);
                    });
                })
                .catch(error => {
                    console.error('Error loading skills:', error);
                    alert('스킬 데이터를 불러오는 중 오류가 발생했습니다.');
                });
        }

        function loadParameters() {
            const skillName = document.getElementById('skill').value;
            const paramsSection = document.getElementById('paramsSection');
            const paramsContainer = document.getElementById('paramsContainer');
            const executeBtn = document.getElementById('executeBtn');
            
            document.getElementById('resultBox').classList.remove('show');

            if (!skillName) {
                paramsSection.classList.remove('show');
                executeBtn.disabled = true;
                return;
            }

            // Find the selected skill
            const skill = currentSkills.find(s => s.methodName === skillName);
            if (!skill) return;

            currentParameters = skill.parameters;
            paramsContainer.innerHTML = '';

            if (skill.parameters.length === 0) {
                paramsSection.classList.remove('show');
            } else {
                skill.parameters.forEach(param => {
                    const item = document.createElement('div');
                    item.className = 'param-item';
                    
                    if (param.type === 'boolean') {
                        item.innerHTML = `
                            <div class="checkbox-wrapper">
                                <input type="checkbox" id="param_${param.name}" name="${param.name}">
                                <label for="param_${param.name}">${param.displayName}</label>
                            </div>
                        `;
                    } else if (param.type === 'int') {
                        item.innerHTML = `
                            <label for="param_${param.name}">${param.displayName}</label>
                            <input type="number" id="param_${param.name}" name="${param.name}" value="10">
                        `;
                    } else if (param.type === 'double') {
                        item.innerHTML = `
                            <label for="param_${param.name}">${param.displayName}</label>
                            <input type="number" step="0.1" id="param_${param.name}" name="${param.name}" value="0.5">
                        `;
                    } else if (param.type.startsWith('enum:')) {
                        const enumName = param.type.split(':')[1];
                        let options = getEnumOptions(enumName);
                        item.innerHTML = `
                            <label for="param_${param.name}">${param.displayName}</label>
                            <select id="param_${param.name}" name="${param.name}">
                                ${options.map(o => `<option value="${o.value}">${o.label}</option>`).join('')}
                            </select>
                        `;
                    } else {
                        item.innerHTML = `
                            <label for="param_${param.name}">${param.displayName}</label>
                            <input type="text" id="param_${param.name}" name="${param.name}">
                        `;
                    }
                    
                    paramsContainer.appendChild(item);
                });
                paramsSection.classList.add('show');
            }
            
            executeBtn.disabled = false;
        }

        function getEnumOptions(enumName) {
            // Handle MinionType enum (summoner minion types)
            if (enumName === 'MinionType') {
                return [
                    { value: 'KOBLIN', label: '코볼린' },
                    { value: 'RORUM', label: '로룸' },
                    { value: 'MUMRU', label: '무므르' },
                    { value: 'SHADERLIN', label: '샤데린' },
                    { value: 'PAGRION', label: '파그리온' },
                    { value: 'RUVELIN', label: '루벨린' },
                    { value: 'GOLEM_KNIGHT', label: '골렘 나이트' },
                    { value: 'BASILOS', label: '바실로스' },
                    { value: 'TENBRAKS', label: '텐브락스' },
                    { value: 'EREVLION', label: '에레블리온' },
                    { value: 'MORDRAKE', label: '모르드라크' },
                    { value: 'KELPROS', label: '켈프로스' },
                    { value: 'CHAOPOLIS', label: '카오폴리스' },
                    { value: 'RAGNAROK', label: '라그나로크' },
                    { value: 'CERBERUS', label: '케르베로스' },
                    { value: 'DEATHBARK', label: '데스바크' },
                    { value: 'MONOSLASHER', label: '모노슬래셔' },
                    { value: 'KARNAITZ', label: '카르나이츠' },
                    { value: 'LUIN', label: '루인' }
                ];
            }
            // Handle MasterArcherPassive enum
            if (enumName === 'MasterArcherPassive') {
                return [
                    { value: 'NONE', label: '없음' },
                    { value: 'POWER_SHOT', label: '파워샷' },
                    { value: 'SPLIT_ARROW', label: '분열 화살' },
                    { value: 'PENETRATING_ARROW', label: '관통 화살' },
                    { value: 'EXPLOSIVE_ARROW', label: '폭탄 화살' },
                    { value: 'DOUBLE_SHOT', label: '더블 샷' }
                ];
            }
            return [{ value: '', label: '선택' }];
        }

        function executeSkill() {
            const subclass = document.getElementById('subclass').value;
            const skill = document.getElementById('skill').value;
            
            if (!subclass || !skill) return;

            // Collect parameters
            const params = {};
            currentParameters.forEach(param => {
                const element = document.getElementById(`param_${param.name}`);
                if (element) {
                    if (param.type === 'boolean') {
                        params[param.name] = element.checked;
                    } else if (param.type === 'int') {
                        params[param.name] = parseInt(element.value) || 0;
                    } else if (param.type === 'double') {
                        params[param.name] = parseFloat(element.value) || 0.0;
                    } else {
                        params[param.name] = element.value;
                    }
                }
            });

            // Execute skill
            const executeBtn = document.getElementById('executeBtn');
            executeBtn.disabled = true;
            executeBtn.textContent = '실행 중...';

            fetch('/api/execute', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    subclass: subclass,
                    skill: skill,
                    params: params,
                    level: parseInt(document.getElementById('globalLevel').value) || 0,
                    externalDamageBonus: parseInt(document.getElementById('globalDamageBonus').value) || 0,
                    externalFinalDamageMult: parseInt(document.getElementById('globalFinalDamageMult').value) || 100
                })
            })
            .then(response => response.json())
            .then(result => {
                const resultBox = document.getElementById('resultBox');
                const resultContent = document.getElementById('resultContent');
                const resultSummary = document.getElementById('resultSummary');
                
                if (result.success && result.data) {
                    resultContent.textContent = result.data.output || '결과 없음';
                    
                    let summaryHtml = '';
                    if (result.data.damageDealt !== undefined && result.data.damageDealt !== 0) {
                        summaryHtml += `<span class="stat"><span class="stat-label">가한 데미지: </span><span class="stat-value highlight">${result.data.damageDealt}</span></span>`;
                    }
                    if (result.data.damageTaken !== undefined && result.data.damageTaken !== 0) {
                        summaryHtml += `<span class="stat"><span class="stat-label">받은 데미지: </span><span class="stat-value">${result.data.damageTaken}</span></span>`;
                    }
                    if (result.data.succeeded !== undefined) {
                        const successClass = result.data.succeeded ? 'success' : 'failure';
                        const successText = result.data.succeeded ? '성공' : '실패';
                        summaryHtml += `<span class="stat"><span class="stat-label">판정: </span><span class="stat-value ${successClass}">${successText}</span></span>`;
                    }
                    if (result.data.manaUsed !== undefined && result.data.manaUsed !== 0) {
                        summaryHtml += `<span class="stat"><span class="stat-label">마나 소모: </span><span class="stat-value">${result.data.manaUsed}</span></span>`;
                    }
                    if (result.data.staminaUsed !== undefined && result.data.staminaUsed !== 0) {
                        summaryHtml += `<span class="stat"><span class="stat-label">스태미나 소모: </span><span class="stat-value">${result.data.staminaUsed}</span></span>`;
                    }
                    
                    resultSummary.innerHTML = summaryHtml || '<span class="stat-label">추가 정보 없음</span>';
                    resultSummary.style.display = summaryHtml ? 'block' : 'none';
                } else {
                    resultContent.textContent = result.message || '실행 오류';
                    resultSummary.innerHTML = '';
                    resultSummary.style.display = 'none';
                }
                
                resultBox.classList.add('show');
            })
            .catch(error => {
                console.error('Error executing skill:', error);
                const resultBox = document.getElementById('resultBox');
                const resultContent = document.getElementById('resultContent');
                resultContent.textContent = '스킬 실행 중 오류가 발생했습니다.';
                resultBox.classList.add('show');
            })
            .finally(() => {
                executeBtn.disabled = false;
                executeBtn.textContent = '🎯 스킬 실행';
            });
        }
    </script>
</body>
</html>
